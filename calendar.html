<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>캘린더</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="calendar">
  <div class="app-shell subpage-shell">
    <header class="subpage-header">
      <a class="back-link" href="index.html">메인으로 돌아가기</a>
      <div>
        <p class="eyebrow">Class Calendar</p>
        <h1 id="calendarSectionTitle">학급 캘린더</h1>
        <p id="calendarSectionDescription" class="muted">월간 학사 일정을 한 화면에서 확인할 수 있습니다.</p>
      </div>
    </header>

    <section class="card cleanup-showcase">
      <div class="panel-head">
        <p class="section-label">캘린더</p>
        <span id="calendarPageMonthBadge" class="panel-chip lavender">이번 달</span>
      </div>
      <div id="calendarPageBoard" class="calendar-board"></div>
      <div class="selected-date-box strong">
        <p class="selected-date-title">선택한 날짜 일정</p>
        <div id="calendarPageSelectedContent" class="selected-date-content muted">달력 날짜를 누르면 해당 날짜 일정이 여기에 표시됩니다.</div>
      </div>
    </section>
  </div>

  <script src="dashboard-data.js"></script>
  <script src="auth.js"></script>
  <script src="detail-pages.js"></script>
</body>
</html>
