name: Update Lunch

on:
  schedule:
    - cron: "30 22 * * 0-4"
  workflow_dispatch:

jobs:
  update-lunch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAGES_PUSH_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Update lunch data
        env:
          FOODSAFETY_SCHOOL_CODE: "7004207"
          FOODSAFETY_MENU_NO: "3017"
        run: node scripts/update-lunch.js

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dashboard-data.js
          git commit -m "Auto-update lunch menu"

      - name: Push changes
        run: |
          if git diff --cached --quiet && git diff --quiet; then
            echo "Nothing to push"
            exit 0
          fi
          git push origin main
