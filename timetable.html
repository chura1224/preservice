<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>시간표</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="timetable">
  <div class="app-shell subpage-shell">
    <header class="subpage-header">
      <a class="back-link" href="index.html">메인으로 돌아가기</a>
      <div>
        <p class="eyebrow">Timetable</p>
        <h1 id="timetableSectionTitle">시간표</h1>
        <p id="timetableSectionDescription" class="muted">담임 시간표와 학급 시간표를 한 번에 확인할 수 있습니다.</p>
      </div>
    </header>

    <main>
      <section class="card roles-showcase">
        <div class="mobile-timetable-board">
          <div id="mobileTimetableDayTabs" class="mobile-day-tabs"></div>

          <article class="mobile-schedule-card">
            <div class="panel-head">
              <p class="section-label">담임 시간표</p>
            </div>
            <div id="mobilePersonalSchedule" class="mobile-day-schedule"></div>
          </article>

          <article class="mobile-schedule-card">
            <div class="panel-head">
              <p class="section-label">학급 시간표</p>
            </div>
            <div id="mobileClassSchedule" class="mobile-day-schedule"></div>
          </article>
        </div>

        <div class="desktop-timetable-row">
          <article class="card desktop-list-card">
            <div class="panel-head">
              <p class="section-label">담임 시간표</p>
              <span class="panel-chip lavender">현재 교시 강조</span>
            </div>
            <div id="subpagePersonalGrid" class="period-grid timetable-grid"></div>
          </article>

          <article class="card desktop-list-card">
            <div class="panel-head">
              <p class="section-label">학급 시간표</p>
              <span class="panel-chip sky">주간 보기</span>
            </div>
            <div id="subpageClassGrid" class="period-grid timetable-grid"></div>
          </article>
        </div>
      </section>
    </main>
  </div>

  <script src="dashboard-data.js"></script>
  <script src="auth.js"></script>
  <script src="detail-pages.js"></script>
</body>
</html>
